services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: lumiskin_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-lumiskin_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  # 2. Redis Cache & Queue Service
  redis:
    image: redis:7-alpine
    container_name: lumiskin_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Backend Service (Express.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lumiskin_backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - PORT=5000
      - NODE_ENV=production
      # Connecting to PostgreSQL container dynamically using variables from .env or fallback defaults
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_password}@db:5432/${DB_NAME:-lumiskin_db}?schema=public
      # Connecting to Redis container
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379
      # Connect to AI model running on the server host machine
      - ML_MODEL_URL=http://host.docker.internal:8000
    volumes:
      - uploads_data:/usr/src/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  uploads_data:
